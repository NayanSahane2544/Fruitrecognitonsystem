<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Recognition AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: white;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        input[type="file"] {
            margin: 20px 0;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #e9ecef;
            border-radius: 8px;
            text-align: left;
        }
        h2 { color: #007bff; margin-top: 0; }
        .data-label { color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍎 AI Fruit Scanner</h1>
        <p>Upload an image of a fruit to learn about it!</p>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/png, image/jpeg" required>
            <br>
            <button type="submit">Analyze Fruit</button>
        </form>

        {% if prediction %}
            <div class="result-box">
                <h2>{{ prediction }}</h2>
                <p><span class="data-label"><strong>Calories:</strong></span> {{ calories }}</p>
                <p><span class="data-label"><strong>Nutrition Info:</strong></span> {{ nutrition }}</p>
                <p><span class="data-label"><strong>Popular Dishes:</strong></span> {{ dishes }}</p>
                <p><span class="data-label"><strong>Common Habitat:</strong></span> {{ habitat }}</p>
            </div>
        {% endif %}
    </div>

</body>
</html>
